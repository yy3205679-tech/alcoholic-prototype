      <path fill="url(#bourbon)" d="M43 84c29 18 93 18 122 0l-23 86c-4 16-13 24-30 24H96c-17 0-26-8-30-24L43 84z"/>
      <ellipse cx="104" cy="84" rx="61" ry="19" fill="#e18433" opacity=".76"/>
      <path fill="url(#glass)" d="M61 73c18 14 21 85 31 121H76C62 159 49 99 48 77c3-3 7-4 13-4z"/>
      <rect x="88" y="95" width="31" height="31" rx="6" fill="#ffe6b6" opacity=".42" transform="rotate(-10 103.5 110.5)"/>
      <path d="M137 56c13-4 24 0 31 10-17 8-31 6-43-5 4-3 8-4 12-5z" fill="#ee8a25"/>
      <path d="M71 72c22 10 57 11 84 1" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".45"/>
      <circle cx="86" cy="83" r="5" fill="#fff" opacity=".48"/>
